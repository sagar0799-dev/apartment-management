version: 1
current_stage: planning
stages:
  framework-bootstrap:
    description: Scaffold and check basic setup
    required_gates:
      - tracker_validation
      - story_validation
  planning:
    description: Validate product requirements and features
    required_gates:
      - tracker_validation
      - story_validation
  implementation:
    description: Code quality gates for implementation stage
    required_gates:
      - tracker_validation
      - story_validation
gates:
  tracker_validation:
    description: Validate tracker consistency across REGISTRY, ROADMAP, and BLUEPRINT.
    command:
      - python3
      - agents/product-manager/scripts/validate-trackers.py
      - --product-root
      - ../apartment-management
      - --skip-feature-evidence
  story_validation:
    description: Validate user stories format and INVEST compliance.
    command:
      - python3
      - agents/product-manager/scripts/validate-stories.py
      - ../apartment-management/planning-mds/features/
